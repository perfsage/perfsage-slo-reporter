name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify tag matches POM version
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          POM_VER=$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout --file pom.xml)
          if [ "$TAG_VER" != "$POM_VER" ]; then
            echo "Tag version '$TAG_VER' must equal Maven project.version '$POM_VER' (push tag v\${project.version} from the release commit)." >&2
            exit 1
          fi

      - name: Build JAR
        run: mvn -B clean package --file pom.xml

      - name: Resolve main artifact
        id: artifact
        run: |
          VERSION=$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout --file pom.xml)
          JAR="target/perfsage-slo-reporter-${VERSION}.jar"
          test -f "$JAR"
          echo "jar_path=$JAR" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact.outputs.tag_name }}
          name: PerfSage SLO Reporter ${{ steps.artifact.outputs.tag_name }}
          body: |
            ## Installation

            **JMeter Plugins Manager (custom repo)**  
            Set `jpgc.repo.address` in `user.properties` (see [README](https://github.com/perfsage/perfsage-slo-reporter/blob/main/README.md)). Descriptor URL (works without GitHub Pages):

            `https://raw.githubusercontent.com/perfsage/perfsage-slo-reporter/main/repo/perfsage-plugins.json`

            **Manual**  
            Download `perfsage-slo-reporter-${{ steps.artifact.outputs.version }}.jar` from Assets below and place it in `$JMETER_HOME/lib/ext/`.

            See [README](https://github.com/perfsage/perfsage-slo-reporter/blob/main/README.md) for Backend Listener usage.
          files: ${{ steps.artifact.outputs.jar_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
