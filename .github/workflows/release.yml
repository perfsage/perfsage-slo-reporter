name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests --file pom.xml

      - name: Get tag name
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: PerfSage SLO Reporter ${{ steps.tag.outputs.tag_name }}
          body: |
            ## Release Notes

            ### What's New
            - Latest improvements and bug fixes

            ### Installation
            ```bash
            mvn dependency:copy -Dartifact=com.perfsage:perfsage-slo-reporter:${{ steps.tag.outputs.tag_name }}:jar
            ```

            ### Documentation
            See [README.md](https://github.com/perfsage/perfsage-slo-reporter/blob/main/README.md) for usage instructions.
          files: |
            target/perfsage-slo-reporter-*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
