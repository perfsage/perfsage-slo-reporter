name: Deploy plugin repository JSON to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'repo/perfsage-plugins.json'
      - 'repo/pages-index.html'
      - 'blog/images/perfsage-slo-report-sample.png'
      - '.github/workflows/plugin-repo-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-plugin-repo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          set -euo pipefail
          test -f repo/perfsage-plugins.json
          test -f repo/pages-index.html
          test -f blog/images/perfsage-slo-report-sample.png
          mkdir -p _site/repo _site/assets
          cp repo/pages-index.html _site/index.html
          cp repo/perfsage-plugins.json _site/repo/perfsage-plugins.json
          cp blog/images/perfsage-slo-report-sample.png _site/assets/perfsage-slo-reporter-screenshot.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
