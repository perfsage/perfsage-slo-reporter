# PerfSage SLO Reporter - Plugin Properties
# JMeter plugin configuration

# Plugin identification
plugin.name=PerfSage SLO Reporter
plugin.version=0.1.1-SNAPSHOT
plugin.description=AI-powered SLO compliance reporter for Apache JMeter
plugin.author=PerfSage
plugin.url=https://github.com/perfsage/perfsage-slo-reporter

# SLO Configuration Defaults
slo.error.rate.threshold=1.0
slo.latency.p99.threshold.ms=500
slo.latency.p95.threshold.ms=300
slo.availability.target=99

# Report Output Settings
report.output.dir=
report.output.file=slo-report.json
report.generate.html=false
report.ai.suggestions.enabled=true

# Analysis Settings
analysis.window.seconds=60

# Backend Listener Parameters
# outputDir: Directory to write the JSON report
# outputFile: Name of the output JSON file
# targetRps: Target requests per second
# generateHtml: Whether to also generate an HTML report
# percentileThreshold: Percentile to use for latency SLO (e.g., 99)
# analysisWindowSeconds: Time window in seconds to consider for analysis
