# PerfSage SLO Reporter - JMeter Plugin Properties
# Required for JMeter to discover and register this plugin

# Plugin registration
com.perfsage.slo.reporter=PerfSage SLO Reporter

# Default configuration
slo.reporter.config.path=slo-config.json
slo.reporter.output.path=slo-report.json

# Logging
slo.reporter.log.level=INFO

# Plugin version
plugin.version=0.1.0
plugin.name=PerfSage SLO Reporter
plugin.description=AI-powered SLO compliance reporter for Apache JMeter
