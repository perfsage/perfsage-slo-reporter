# =============================================
# PerfSage SLO Reporter - Sample Configuration
# =============================================
# Copy this file to $JMETER_HOME/bin/user.properties
# and customize values for your use case

# =============================================
# GLOBAL SETTINGS
# =============================================

# Enable/disable SLO reporting
perfsage.slo.enabled=true

# Report output formats: html, json, csv, markdown
perfsage.slo.report.format=html,json

# Output directory for generated reports
perfsage.slo.report.dir=${JMETER_HOME}/reports

# Exit with code 1 if any SLO fails (for CI/CD)
perfsage.slo.exit.on.failure=false

# =============================================
# SLO RULE 1: Response Time
# =============================================
# Name: Homepage Response Time
# Metric: 95th percentile response time
# Threshold: Must be less than or equal to 500ms

perfsage.slo.response.name=Homepage Response Time
perfsage.slo.response.unit=ms
perfsage.slo.response.operator=lte
perfsage.slo.response.threshold=500
perfsage.slo.response.percentile=95

# =============================================
# SLO RULE 2: Error Rate
# =============================================
# Name: API Error Rate
# Metric: Percentage of failed requests
# Threshold: Must be less than or equal to 1%

perfsage.slo.error.name=API Error Rate
perfsage.slo.error.unit=percent
perfsage.slo.error.operator=lte
perfsage.slo.error.threshold=1.0

# =============================================
# SLO RULE 3: Throughput
# =============================================
# Name: Throughput
# Metric: Transactions per second
# Threshold: Must be greater than or equal to 1000 TPS

perfsage.slo.throughput.name=Throughput
perfsage.slo.throughput.unit=tps
perfsage.slo.throughput.operator=gte
perfsage.slo.throughput.threshold=1000

# =============================================
# SLO RULE 4: P99 Latency (Advanced)
# =============================================
# Name: P99 Response Time
# Metric: 99th percentile response time
# Threshold: Must be less than 1000ms
# This ensures tail latency is acceptable

perfsage.slo.p99.name=P99 Response Time
perfsage.slo.p99.unit=ms
perfsage.slo.p99.operator=lte
perfsage.slo.p99.threshold=1000
perfsage.slo.p99.percentile=99
